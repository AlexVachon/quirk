name: Release

# Fires on `vX.Y.Z` (compiler) tag pushes only. The leading `v` followed
# by a digit excludes `vscode-vX.Y.Z` (extension) tags — those have their
# own workflow (publish-vscode.yml). Without this restriction the
# compiler build would also fire on extension tags and pollute the
# extension's release with a mis-named compiler tarball.
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  linux-x86_64:
    # `runs-on: ubuntu-22.04` is just the host shell where the action runner
    # itself lives. The actual compile happens inside `container:` so the
    # produced binary is linked against the container's glibc.
    runs-on: ubuntu-22.04
    # Build inside ubuntu:20.04 (glibc 2.31) so the resulting binary runs
    # on every modern Linux distro — Ubuntu 20.04+, Debian 11+, RHEL 9+,
    # WSL with the default Ubuntu image, etc. The earlier ubuntu-22.04
    # runner build was glibc 2.34-linked and refused to start on 20.04.
    container:
      image: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install base tools
        # The bare ubuntu:20.04 image is intentionally minimal — needs git
        # for actions/checkout@v4 to operate inside the container, and
        # curl + ca-certificates + gnupg to add the LLVM apt repo (Ubuntu
        # 20.04's default repos don't ship llvm-14).
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl gnupg lsb-release software-properties-common git

      - name: Add LLVM 14 apt repository
        # Quirk pins LLVM 14. Ubuntu 20.04 (focal) doesn't have it in its
        # default sources; LLVM publishes its own apt repo for every major.
        # Using `signed-by` instead of the deprecated `apt-key`.
        run: |
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key \
            | gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] https://apt.llvm.org/focal/ llvm-toolchain-focal-14 main" \
            > /etc/apt/sources.list.d/llvm-14.list
          apt-get update

      - name: Install build dependencies
        # Mirror quirk-compiler/setup.sh's apt list. `llvm-14` is the
        # meta-package that ships `llvm-config-14`; `llvm-14-dev` alone
        # would miss it.
        run: |
          apt-get install -y --no-install-recommends \
            build-essential gcc g++ make pkg-config \
            llvm-14 libllvm14 llvm-14-dev \
            libgc-dev libssl-dev

      - uses: actions/checkout@v4

      - name: Build compiler + runtime
        working-directory: quirk-compiler
        run: make -j"$(nproc)"

      - name: Smoke-test the binary
        working-directory: quirk-compiler
        env:
          QUIRK_HOME: ${{ github.workspace }}/quirk-compiler
        # Catch obvious linkage failures before we ship a broken artifact.
        run: |
          ./bin/quirk --version
          # Also confirm the glibc baseline — fail loudly if the build
          # somehow links against anything newer than glibc 2.31.
          echo "Required glibc symbols:"
          objdump -T ./bin/quirk | awk '/GLIBC_/{print $5}' | sort -u
          echo 'use console
          define main() -> void { console.log("hello from CI") }' > /tmp/smoke.quirk
          ./bin/quirk /tmp/smoke.quirk

      - name: Package
        id: pkg
        # Mirror the SOURCE TREE layout exactly — that's the layout the
        # compiler's stdlib resolution actually expects:
        #   <QUIRK_HOME>/bin/quirk
        #   <QUIRK_HOME>/bin/runtime.so      (sibling of the binary)
        #   <QUIRK_HOME>/packages/console/...  (top-level, NOT under lib/quirk/)
        # Pre-1.0.8 releases used `libs/` at the same level; the resolver
        # still recognises that name for back-compat, but new packaging
        # ships everything under `packages/`.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="quirk-${VERSION}-linux-x86_64"
          mkdir -p "${PKG}/bin"
          cp quirk-compiler/bin/quirk      "${PKG}/bin/"
          cp quirk-compiler/bin/runtime.so "${PKG}/bin/"
          cp -r quirk-compiler/packages    "${PKG}/packages"
          cp README.md INSTALL.md           "${PKG}/" 2>/dev/null || true
          cp quirk-compiler/CHANGELOG.md    "${PKG}/" 2>/dev/null || true
          tar czf "${PKG}.tar.gz" "${PKG}"
          # SHA256 lets install.sh verify the download.
          sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"
          echo "pkg=${PKG}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        # Runs as a JS action on the runner host, NOT inside the container —
        # which is what we want (the container has its own /tmp etc.).
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.pkg }}.tar.gz
            ${{ steps.pkg.outputs.pkg }}.tar.gz.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  macos-arm64:
    # First macOS build, added in v1.3. Uses Apple Silicon (macos-latest
    # = arm64). Source already compiles cleanly thanks to the
    # `_NSGetExecutablePath` shim and platform-agnostic `dlopen` calls;
    # this job just verifies CI can produce a runnable arm64 binary and
    # uploads it alongside the linux tarball.
    #
    # `continue-on-error: true` keeps a macOS failure from blocking a
    # release while the platform is in its first-shipping window. Drop
    # the flag once we have a couple of clean macOS releases.
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        # llvm@14 is keg-only on Homebrew (parallel installs of multiple
        # LLVM versions don't share PATH), so we pin via LLVM_CONFIG below
        # instead of touching PATH.
        run: brew install llvm@14 bdw-gc openssl@3

      - name: Build compiler + runtime
        working-directory: quirk-compiler
        env:
          LLVM_CONFIG: /opt/homebrew/opt/llvm@14/bin/llvm-config
          # Homebrew installs headers under <prefix>/include. The runtime
          # uses bdw-gc + openssl, both keg-only, so pkg-config-style paths
          # don't help — explicit -I + -L is the simplest.
          CPATH: /opt/homebrew/opt/bdw-gc/include:/opt/homebrew/opt/openssl@3/include
          LIBRARY_PATH: /opt/homebrew/opt/bdw-gc/lib:/opt/homebrew/opt/openssl@3/lib
        run: make -j"$(sysctl -n hw.ncpu)"

      - name: Smoke-test the binary
        working-directory: quirk-compiler
        env:
          QUIRK_HOME: ${{ github.workspace }}/quirk-compiler
        run: |
          ./bin/quirk --version
          echo 'use console
          define main() -> void { console.log("hello from macOS CI") }' > /tmp/smoke.quirk
          ./bin/quirk /tmp/smoke.quirk

      - name: Package
        id: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="quirk-${VERSION}-darwin-arm64"
          mkdir -p "${PKG}/bin"
          cp quirk-compiler/bin/quirk      "${PKG}/bin/"
          cp quirk-compiler/bin/runtime.so "${PKG}/bin/"
          cp -r quirk-compiler/packages    "${PKG}/packages"
          cp README.md INSTALL.md           "${PKG}/" 2>/dev/null || true
          cp quirk-compiler/CHANGELOG.md    "${PKG}/" 2>/dev/null || true
          tar czf "${PKG}.tar.gz" "${PKG}"
          shasum -a 256 "${PKG}.tar.gz" | awk '{print $1"  "$2}' > "${PKG}.tar.gz.sha256"
          echo "pkg=${PKG}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.pkg }}.tar.gz
            ${{ steps.pkg.outputs.pkg }}.tar.gz.sha256
          generate_release_notes: false   # the linux job already wrote them
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
