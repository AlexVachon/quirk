<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="quirk-grad-fit" x1="30" y1="30" x2="98" y2="98" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7" />
      <stop offset="1" stop-color="#22D3EE" />
    </linearGradient>
  </defs>

  <!-- Q bowl: 270° arc. Same geometry as the previous icon. -->
  <path d="M100 64C100 83.8823 83.8823 100 64 100C44.1177 100 28 83.8823 28 64C28 44.1177 44.1177 28 64 28C75 28 84 32 91 40"
        stroke="url(#quirk-grad-fit)"
        stroke-width="18"
        stroke-linecap="round" />

  <!-- Q tail: diagonal shaft from inside the bowl out to the corner. -->
  <line x1="82" y1="82" x2="104" y2="104"
        stroke="url(#quirk-grad-fit)"
        stroke-width="18"
        stroke-linecap="round" />

  <!-- Arrowhead: filled right-triangle wedge that turns the tail into a ↘ arrow.
       Hints at direction / JIT speed without crowding the silhouette. -->
  <polygon points="116,92 116,116 92,116"
           fill="url(#quirk-grad-fit)" />
</svg>
