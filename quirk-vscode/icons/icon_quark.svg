<svg width="132" height="132" viewBox="0 0 132 132" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGradient" x1="0" y1="0" x2="132" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06B6D4" />
      <stop offset="0.5" stop-color="#818CF8" />
      <stop offset="1" stop-color="#6366F1" />
    </linearGradient>
  </defs>
  <!-- Containment ring. Suggests a hadron enclosing its quarks. Outline only so the
       icon stays light on both bright and dark VSCode themes. -->
  <circle cx="64" cy="69" r="55" stroke="url(#ringGradient)" stroke-width="5" fill="none" />

  <!-- Three quarks. Palette: two cool indigo tones + one cyan accent. -->
  <circle cx="64" cy="45" r="18" fill="#818CF8" />
  <circle cx="40" cy="85" r="18" fill="#6366F1" />
  <circle cx="88" cy="85" r="18" fill="#06B6D4" />
</svg>
